name: Build TWRP (Docker Mode)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Запускаем сборку в изолированном контейнере со старым окружением
    container:
      image: ubuntu:20.04
      options: --privileged

    steps:
    - name: Set Timezone & Noninteractive
      run: |
        ln -sf /usr/share/zoneinfo/UTC /etc/localtime
        echo "UTC" > /etc/timezone
        apt-get update && apt-get install -y tzdata

    - name: Install Build Dependencies
      run: |
        apt-get update
        apt-get install -y g++-multilib lib32ncurses5-dev liblz4-tool libssl-dev libxml2-utils squashfs-tools xxhash git git-lfs curl wget python3 python-is-python3 sudo cpio bc unzip

    - name: Check Out Repo
      uses: actions/checkout@v4

    - name: Set up Repo Tool
      run: |
        mkdir -p /usr/local/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        chmod a+x /usr/local/bin/repo

    - name: Sync TWRP Sources
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        mkdir twrp
        cd twrp
        git config --global user.name "Builder"
        git config --global user.email "builder@twrp.me"

        # Используем официальный рабочий манифест TWRP вместо удаленного
        /usr/local/bin/repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1

        /usr/local/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd twrp
        git clone https://github.com/${{ github.repository }} device/infinix/hot20i

    - name: Extract Kernel via Magiskboot
      run: |
        cd twrp/device/infinix/hot20i
        # Скачиваем x86 бинарник и сразу принудительно сохраняем его как 'magiskboot'
        wget -O magiskboot https://github.com/Shubhamvis98/AIK/raw/4ac321dfd48e16344e6146c505708aa720ff0bb3/bin/magiskboot_x86
        chmod +x magiskboot
        
        # Распаковываем бут
        ./magiskboot unpack boot.img
        
        # Подсовываем ядро компилятору
        if [ -f kernel ]; then
          echo "Kernel extracted successfully!"
        elif [ -f kernel-dtb ]; then
          mv kernel-dtb kernel
        fi
        
        # Чистим временные файлы
        rm -rf ramdisk.cpio dtb extra magiskboot

    - name: Build Boot Image
      # Принудительно заставляем этот шаг выполняться в bash, а не в sh
      shell: bash
      run: |
        export PATH=/usr/local/bin:$PATH
        cd twrp
        
        mkdir -p build/make/target/product/
        touch build/make/target/product/embedded.mk
        
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_hot20i-userdebug
        make bootimage -j$(nproc --all)

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Boot-Infinix
        path: twrp/out/target/product/hot20i/boot.img
