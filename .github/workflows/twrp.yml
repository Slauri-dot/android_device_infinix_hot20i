name: Build TWRP (Docker Mode)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Запускаем сборку в изолированном контейнере со старым окружением
    container:
      image: ubuntu:20.04
      options: --privileged

    steps:
    - name: Set Timezone & Noninteractive
      run: |
        ln -sf /usr/share/zoneinfo/UTC /etc/localtime
        echo "UTC" > /etc/timezone
        apt-get update && apt-get install -y tzdata

    - name: Install Build Dependencies
      run: |
        apt-get update
        apt-get install -y g++-multilib lib32ncurses5-dev liblz4-tool libssl-dev libxml2-utils squashfs-tools xxhash toolchain-prefix-bin git git-lfs curl wget python3 python-is-python3 sudo cpio bc

    - name: Check Out Repo
      uses: actions/checkout@v3

    - name: Set up Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "PATH=~/bin:$PATH" » $GITHUB_ENV

    - name: Sync TWRP Sources
      run: |
        export PATH=~/bin:$PATH
        mkdir twrp
        cd twrp
        git config --global user.name "Builder"
        git config --global user.email "builder@twrp.me"
        repo init --depth=1 -u https://github.com/Minimal-TWRP-Arm64/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd twrp
        git clone https://github.com/${{ github.repository }} device/infinix/hot20i

    - name: Extract Kernel via Magiskboot
      run: |
        cd twrp/device/infinix/hot20i
        wget https://github.com/jm7181/magiskboot-binaries/raw/main/magiskboot
        chmod +x magiskboot
        ./magiskboot unpack boot.img
        if [ -f kernel ]; then
          echo "Kernel extracted successfully!"
        elif [ -f kernel-dtb ]; then
          mv kernel-dtb kernel
        fi
        rm -rf ramdisk.cpio dtb extra magiskboot

    - name: Build Boot Image
      run: |
        export PATH=~/bin:$PATH
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        . build/envsetup.sh
        lunch omni_hot20i-userdebug
        make bootimage -j$(nproc --all)

    - name: Upload Result
      uses: actions/upload-artifact@v3
      with:
        name: TWRP-Boot-Infinix
        path: twrp/out/target/product/hot20i/boot.img
